<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MF Finance - Manajemen Komunitas</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Babel untuk kompilasi React JSX di dalam HTML -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Import Map untuk mendefinisikan lokasi modul React agar dikenali oleh modul lain -->
    <script type="importmap">
        {
            "imports": {
                "react": "https://esm.sh/react@18.2.0",
                "react-dom/client": "https://esm.sh/react-dom@18.2.0/client"
            }
        }
    </script>

    <!-- Konfigurasi Font kustom (Opsional agar lebih elegan) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        /* Memperbesar skala elemen otomatis mengikuti lebar layar */
        @media (min-width: 640px) { html { font-size: 105%; } }
        @media (min-width: 1024px) { html { font-size: 110%; } }
        @media (min-width: 1280px) { html { font-size: 115%; } }
        @media (min-width: 1536px) { html { font-size: 125%; } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">
    
    <div id="root"></div>

    <!-- Script Utama Aplikasi (React + Firebase) -->
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        
        // Import Ikon
        import { 
            LayoutDashboard, CalendarDays, Wallet, Plus, Trash2, MapPin, Clock, X, Users, DollarSign,
            ChevronLeft, CheckCircle2, Circle, UserX, UserCheck, ArrowUpDown, ArrowDownToLine, ArrowUpFromLine, Info
        } from 'https://esm.sh/lucide-react@0.292.0?external=react';

        // Import Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- FIREBASE SETUP ---
        const firebaseConfig = {
            apiKey: "AIzaSyCrcvMMZMq9KY4M32ttQc_jgSGVCh3_ydA",
            authDomain: "finance-b5d3e.firebaseapp.com",
            projectId: "finance-b5d3e",
            storageBucket: "finance-b5d3e.firebasestorage.app",
            messagingSenderId: "750038701540",
            appId: "1:750038701540:web:776bee9bacdcfcbb7223f1"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        // Menggunakan ID statis untuk standalone deploy
        const appId = typeof window.__app_id !== 'undefined' ? window.__app_id : 'mf-finance-app-prod';

        function App() {
            const [user, setUser] = useState(null);
            const [isLoading, setIsLoading] = useState(true);

            const [activeTab, setActiveTab] = useState('dashboard');
            const [transactions, setTransactions] = useState([]);
            const [events, setEvents] = useState([]);
            const [selectedEventId, setSelectedEventId] = useState(null);

            // Modals state
            const [isKasModalOpen, setIsKasModalOpen] = useState(false);
            const [isEventModalOpen, setIsEventModalOpen] = useState(false);
            const [isBulkModalOpen, setIsBulkModalOpen] = useState(false);

            // Sorting state (Event Participants)
            const [sortConfig, setSortConfig] = useState({ key: 'name', direction: 'asc' });

            // --- FIREBASE HOOKS ---
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof window.__initial_auth_token !== 'undefined' && window.__initial_auth_token) {
                            try {
                                await signInWithCustomToken(auth, window.__initial_auth_token);
                            } catch (tokenError) {
                                console.warn("Token otentikasi internal tidak cocok. Menggunakan login anonim...", tokenError);
                                await signInAnonymously(auth);
                            }
                        } else {
                            // Ini akan tereksekusi saat aplikasi di-deploy secara mandiri
                            await signInAnonymously(auth);
                        }
                    } catch (error) {
                        console.error("Auth Error:", error);
                    }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;

                const txRef = collection(db, 'artifacts', appId, 'public', 'data', 'transactions');
                const evRef = collection(db, 'artifacts', appId, 'public', 'data', 'events');

                const unsubTx = onSnapshot(txRef, (snapshot) => {
                    const txData = snapshot.docs.map(doc => doc.data());
                    setTransactions(txData);
                }, (error) => console.error("Error fetching transactions:", error));

                const unsubEv = onSnapshot(evRef, (snapshot) => {
                    const evData = snapshot.docs.map(doc => doc.data());
                    setEvents(evData);
                    setIsLoading(false);
                }, (error) => console.error("Error fetching events:", error));

                return () => {
                    unsubTx();
                    unsubEv();
                };
            }, [user]);

            // --- HELPERS ---
            const requestSort = (key) => {
                let direction = 'asc';
                if (sortConfig.key === key && sortConfig.direction === 'asc') direction = 'desc';
                setSortConfig({ key, direction });
            };

            const formatIDR = (amount) => {
                return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(amount || 0);
            };

            const formatDate = (dateString) => {
                const options = { day: 'numeric', month: 'long', year: 'numeric' };
                return new Date(dateString).toLocaleDateString('id-ID', options);
            };

            const getTodayString = () => new Date().toISOString().split('T')[0];

            const getParticipantHTM = (baseHtm, category) => {
                const htm = Number(baseHtm);
                switch(category) {
                    case 'Kiper': return htm * 0.5;
                    case 'Pelajar': return htm * 0.8;
                    case 'Pengurus': return 0;
                    case 'Pemain':
                    default: return htm;
                }
            };

            // --- CALCULATIONS ---
            const manualIncome = transactions.filter(t => t.type === 'in').reduce((acc, t) => acc + t.amount, 0);
            const manualExpense = transactions.filter(t => t.type === 'out').reduce((acc, t) => acc + t.amount, 0);
            const piutangLunas = transactions.filter(t => t.type === 'piutang' && t.status === 'Lunas').reduce((acc, t) => acc + t.amount, 0);
            const hutangLunas = transactions.filter(t => t.type === 'hutang' && t.status === 'Lunas').reduce((acc, t) => acc + t.amount, 0);
            const manualPiutangAktif = transactions.filter(t => t.type === 'piutang' && t.status === 'Belum').reduce((acc, t) => acc + t.amount, 0);
            const totalHutangAktif = transactions.filter(t => t.type === 'hutang' && t.status === 'Belum').reduce((acc, t) => acc + t.amount, 0);

            let eventsIncome = 0;
            let eventsExpense = 0;
            let eventPiutangAktif = 0;
            let eventPiutangList = [];
            
            const pastEvents = events.filter(ev => ev.date < getTodayString());

            pastEvents.forEach(ev => {
                ev.participants.forEach(p => {
                    const htm = getParticipantHTM(ev.htm, p.category);
                    if (p.status === 'Hadir') {
                        if (p.isPaid) {
                            eventsIncome += htm;
                        } else if (htm > 0) {
                            eventPiutangAktif += htm;
                            eventPiutangList.push({
                                id: `ev-${ev.id}-p-${p.id}`,
                                isEventPiutang: true,
                                eventId: ev.id,
                                participantId: p.id,
                                type: 'piutang',
                                amount: htm,
                                desc: `Tunggakan HTM: ${p.name} (${ev.title})`,
                                date: ev.date,
                                status: 'Belum'
                            });
                        }
                    }
                });
                eventsExpense += ev.expenses.reduce((sum, exp) => sum + exp.amount, 0);
            });

            const totalPiutangAktif = manualPiutangAktif + eventPiutangAktif;
            const totalIncomeFisik = manualIncome + piutangLunas + eventsIncome;
            const totalExpenseFisik = manualExpense + hutangLunas + eventsExpense;
            const totalKasBalance = totalIncomeFisik - totalExpenseFisik;

            const allTransactions = [...transactions, ...eventPiutangList].sort((a, b) => new Date(b.date) - new Date(a.date));

            // --- HANDLERS: DATABASE OPERATIONS ---
            
            // Kas Operations
            const handleAddTransaction = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const type = formData.get('type');
                const newTx = {
                    id: Date.now(),
                    type: type,
                    amount: Number(formData.get('amount')),
                    desc: formData.get('desc'),
                    date: formData.get('date'),
                    status: (type === 'in' || type === 'out') ? 'Lunas' : 'Belum'
                };
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'transactions', String(newTx.id)), newTx);
                setIsKasModalOpen(false);
            };

            const handleDeleteTransaction = async (id) => {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'transactions', String(id)));
            };

            const handleMarkTransactionLunas = async (tx) => {
                if (tx.isEventPiutang) {
                    const ev = events.find(e => e.id === tx.eventId);
                    if (ev) {
                        const updatedParticipants = ev.participants.map(p => 
                            p.id === tx.participantId ? { ...p, isPaid: true } : p
                        );
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'events', String(tx.eventId)), { ...ev, participants: updatedParticipants });
                    }
                } else {
                    const t = transactions.find(t => t.id === tx.id);
                    if (t) {
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'transactions', String(tx.id)), { ...t, status: 'Lunas' });
                    }
                }
            };

            // Event Operations
            const handleAddEvent = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const newEv = {
                    id: Date.now(),
                    title: formData.get('title'),
                    type: formData.get('type'),
                    date: formData.get('date'),
                    time: formData.get('time'),
                    location: formData.get('location'),
                    htm: 0,
                    participants: [],
                    expenses: []
                };
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'events', String(newEv.id)), newEv);
                setIsEventModalOpen(false);
            };

            const handleDeleteEvent = async (id) => {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'events', String(id)));
                if (selectedEventId === id) setSelectedEventId(null);
            };

            const handleUpdateHTM = async (eventId, newHtm) => {
                const ev = events.find(e => e.id === eventId);
                if(ev) await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'events', String(eventId)), { ...ev, htm: Number(newHtm) });
            };

            const handleAddParticipant = async (e, eventId) => {
                e.preventDefault();
                const name = e.target.name.value;
                const category = e.target.category.value;
                if (!name) return;
                
                const ev = events.find(e => e.id === eventId);
                if (ev) {
                    const newP = { id: Date.now(), name, category, status: 'Hadir', isPaid: category === 'Pengurus' };
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'events', String(eventId)), { ...ev, participants: [...ev.participants, newP] });
                }
                e.target.reset();
            };

            const handleUpdateParticipantCategory = async (eventId, participantId, newCategory) => {
                const ev = events.find(e => e.id === eventId);
                if (ev) {
                    const updatedP = ev.participants.map(p => 
                        p.id === participantId ? { ...p, category: newCategory, isPaid: newCategory === 'Pengurus' ? true : p.isPaid } : p
                    );
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'events', String(eventId)), { ...ev, participants: updatedP });
                }
            };

            const handleTogglePayment = async (eventId, participantId) => {
                const ev = events.find(e => e.id === eventId);
                if (ev) {
                    const updatedP = ev.participants.map(p => p.id === participantId ? { ...p, isPaid: !p.isPaid } : p);
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'events', String(eventId)), { ...ev, participants: updatedP });
                }
            };

            const handleToggleStatus = async (eventId, participantId) => {
                const ev = events.find(e => e.id === eventId);
                if (ev) {
                    const updatedP = ev.participants.map(p => p.id === participantId ? { ...p, status: p.status === 'Hadir' ? 'Cancel' : 'Hadir' } : p);
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'events', String(eventId)), { ...ev, participants: updatedP });
                }
            };

            const handleDeleteParticipant = async (eventId, participantId) => {
                const ev = events.find(e => e.id === eventId);
                if (ev) {
                    const updatedP = ev.participants.filter(p => p.id !== participantId);
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'events', String(eventId)), { ...ev, participants: updatedP });
                }
            };

            const handleAddBulkParticipants = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const categories = ['pemain', 'kiper', 'pelajar', 'pengurus'];
                const categoryMap = { 'pemain': 'Pemain', 'kiper': 'Kiper', 'pelajar': 'Pelajar', 'pengurus': 'Pengurus' };
                
                let newParticipants = [];
                let currentId = Date.now();

                categories.forEach(cat => {
                    const text = formData.get(cat);
                    if (text) {
                        const names = text.split('\n').map(n => n.trim()).filter(n => n);
                        names.forEach(name => {
                            newParticipants.push({
                                id: currentId++, name, category: categoryMap[cat], status: 'Hadir', isPaid: categoryMap[cat] === 'Pengurus'
                            });
                        });
                    }
                });

                if (newParticipants.length > 0) {
                    const ev = events.find(e => e.id === selectedEventId);
                    if (ev) {
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'events', String(selectedEventId)), { ...ev, participants: [...ev.participants, ...newParticipants] });
                    }
                }
                setIsBulkModalOpen(false);
            };

            const handleAddExpense = async (e, eventId) => {
                e.preventDefault();
                const desc = e.target.desc.value;
                const amount = Number(e.target.amount.value);
                if (!desc || !amount) return;
                
                const ev = events.find(e => e.id === eventId);
                if (ev) {
                    const newE = { id: Date.now(), desc, amount };
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'events', String(eventId)), { ...ev, expenses: [...ev.expenses, newE] });
                }
                e.target.reset();
            };

            const handleDeleteExpense = async (eventId, expenseId) => {
                const ev = events.find(e => e.id === eventId);
                if (ev) {
                    const updatedE = ev.expenses.filter(exp => exp.id !== expenseId);
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'events', String(eventId)), { ...ev, expenses: updatedE });
                }
            };

            // --- COMPONENTS ---
            if (isLoading) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center bg-slate-50 gap-4 text-emerald-600">
                        <div className="w-12 h-12 border-4 border-emerald-200 border-t-emerald-600 rounded-full animate-spin"></div>
                        <p className="font-medium text-slate-500">Menyinkronkan data komunitas...</p>
                    </div>
                );
            }

            const TabButton = ({ id, label, icon: Icon }) => (
                <button
                    onClick={() => { setActiveTab(id); setSelectedEventId(null); }}
                    className={`flex items-center gap-2 px-5 py-3 rounded-xl transition-all duration-300 font-medium ${
                        activeTab === id 
                            ? 'bg-emerald-600 text-white shadow-md shadow-emerald-200' 
                            : 'text-slate-500 hover:bg-slate-100 hover:text-slate-900'
                    }`}
                >
                    <Icon size={20} />
                    <span className="hidden sm:inline">{label}</span>
                </button>
            );

            const EventCard = ({ ev }) => {
                const isPast = ev.date < getTodayString();
                const hadirCount = ev.participants.filter(p => p.status === 'Hadir').length;
                
                const eventIncome = ev.participants
                    .filter(p => p.isPaid && p.status === 'Hadir')
                    .reduce((sum, p) => sum + getParticipantHTM(ev.htm, p.category), 0);
                const eventExpense = ev.expenses.reduce((sum, exp) => sum + exp.amount, 0);
                const eventNet = eventIncome - eventExpense;

                return (
                    <div onClick={() => setSelectedEventId(ev.id)} className={`border rounded-2xl p-5 shadow-sm hover:shadow-md transition-all cursor-pointer relative group ${isPast ? 'bg-slate-50 border-slate-200' : 'bg-white border-emerald-100'}`}>
                        <button onClick={(e) => { e.stopPropagation(); handleDeleteEvent(ev.id); }} className="absolute top-4 right-4 text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity"><Trash2 size={18} /></button>
                        <div className="flex items-center gap-2 mb-3">
                            <span className={`text-xs font-bold px-2.5 py-1 rounded-full ${isPast ? 'bg-slate-200 text-slate-600' : 'bg-emerald-100 text-emerald-700'}`}>{isPast ? 'Selesai' : 'Akan Datang'}</span>
                            <span className="text-xs font-semibold px-2.5 py-1 rounded-full bg-blue-50 text-blue-600 border border-blue-100">{ev.type || 'Internal Match'}</span>
                        </div>
                        <h3 className="font-bold text-lg text-slate-800 mb-4 pr-6">{ev.title}</h3>
                        <div className="space-y-2.5 mb-5">
                            <div className="flex items-center gap-3 text-sm text-slate-600"><CalendarDays size={16} className={isPast ? 'text-slate-400' : 'text-emerald-600'} />{formatDate(ev.date)} • {ev.time}</div>
                            <div className="flex items-center gap-3 text-sm text-slate-600"><MapPin size={16} className={isPast ? 'text-slate-400' : 'text-emerald-600'} />{ev.location}</div>
                            <div className="flex items-center gap-3 text-sm text-slate-600"><Users size={16} className={isPast ? 'text-slate-400' : 'text-emerald-600'} />{hadirCount} Peserta Hadir (Base HTM: {formatIDR(ev.htm)})</div>
                        </div>
                        <div className="pt-4 border-t border-slate-100 flex justify-between items-center">
                            <span className="text-xs text-slate-500 font-medium">Rekap Keuangan</span>
                            <span className={`text-sm font-bold ${eventNet >= 0 ? 'text-emerald-600' : 'text-red-500'}`}>{eventNet >= 0 ? '+' : ''}{formatIDR(eventNet)}</span>
                        </div>
                    </div>
                );
            };

            const selectedEvent = events.find(e => e.id === selectedEventId);

            return (
                <div className="min-h-screen font-sans text-slate-800 selection:bg-emerald-200 pb-20">
                    {/* HEADER & NAV */}
                    <div className="bg-white sticky top-0 z-10 shadow-sm border-b border-slate-100">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="flex justify-between items-center h-20">
                                <div className="flex items-center gap-3">
                                    <div className="w-10 h-10 bg-gradient-to-br from-emerald-500 to-teal-600 rounded-xl flex items-center justify-center text-white font-bold text-xl shadow-lg shadow-emerald-200">MF</div>
                                    <div>
                                        <h1 className="font-bold text-xl leading-tight text-slate-900">MF Finance</h1>
                                        <p className="text-xs text-slate-500 font-medium">Manajemen Komunitas</p>
                                    </div>
                                </div>
                                <nav className="flex items-center gap-2">
                                    <TabButton id="dashboard" label="Dashboard" icon={LayoutDashboard} />
                                    <TabButton id="event" label="Event" icon={CalendarDays} />
                                    <TabButton id="kas" label="Buku Kas" icon={Wallet} />
                                </nav>
                            </div>
                        </div>
                    </div>

                    {/* MAIN CONTENT */}
                    <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
                        
                        {/* VIEW: DASHBOARD */}
                        {activeTab === 'dashboard' && (
                            <div className="space-y-6 animate-in fade-in duration-500">
                                <h2 className="text-2xl font-bold text-slate-900">Ringkasan Komunitas</h2>
                                
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    <div className="bg-gradient-to-br from-emerald-600 to-teal-700 rounded-2xl p-6 text-white shadow-xl shadow-emerald-100 relative overflow-hidden">
                                        <div className="absolute right-0 top-0 opacity-10 pointer-events-none">
                                            <Wallet size={120} className="transform translate-x-4 -translate-y-4" />
                                        </div>
                                        <p className="text-emerald-100 font-medium mb-1">Total Kas Fisik</p>
                                        <h3 className="text-3xl font-bold tracking-tight mb-4">{formatIDR(totalKasBalance)}</h3>
                                        <div className="flex gap-4 text-sm mt-6">
                                            <div className="bg-white/20 px-3 py-1.5 rounded-lg backdrop-blur-sm">
                                                <span className="block text-emerald-100 text-xs">Total Pemasukan</span>
                                                <span className="font-semibold">{formatIDR(totalIncomeFisik)}</span>
                                            </div>
                                            <div className="bg-white/20 px-3 py-1.5 rounded-lg backdrop-blur-sm">
                                                <span className="block text-emerald-100 text-xs">Total Pengeluaran</span>
                                                <span className="font-semibold">{formatIDR(totalExpenseFisik)}</span>
                                            </div>
                                        </div>
                                        <p className="text-[10px] text-emerald-200 mt-4 italic">*Pemasukan & Pengeluaran event hanya dihitung dari event yang sudah selesai.</p>
                                    </div>

                                    <div className="bg-white rounded-2xl p-6 border border-slate-100 shadow-sm md:col-span-2">
                                        <div className="flex justify-between items-center mb-4">
                                            <h3 className="font-bold text-slate-800">Event Terdekat</h3>
                                            <button onClick={() => setActiveTab('event')} className="text-sm text-emerald-600 font-medium hover:underline">Lihat Semua</button>
                                        </div>
                                        <div className="flex gap-4 overflow-x-auto pb-2">
                                            {events.filter(e => e.date >= getTodayString()).slice(0, 2).map(ev => (
                                                <div key={ev.id} className="min-w-[280px] border border-emerald-100 bg-emerald-50/30 rounded-xl p-4 flex-1">
                                                    <h4 className="font-bold text-slate-800 mb-2 truncate">{ev.title}</h4>
                                                    <div className="flex items-center gap-2 text-sm text-slate-600 mb-1">
                                                        <CalendarDays size={14} className="text-emerald-600" /> {formatDate(ev.date)}
                                                    </div>
                                                    <div className="flex items-center gap-2 text-sm text-slate-600">
                                                        <MapPin size={14} className="text-emerald-600" /> {ev.location}
                                                    </div>
                                                </div>
                                            ))}
                                            {events.filter(e => e.date >= getTodayString()).length === 0 && (
                                                <p className="text-slate-500 text-sm py-4">Belum ada event terjadwal.</p>
                                            )}
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-white rounded-2xl p-6 border border-slate-100 shadow-sm mt-6">
                                    <div className="flex justify-between items-center mb-6">
                                        <h3 className="font-bold text-slate-800">Riwayat Event Terakhir</h3>
                                        <button onClick={() => setActiveTab('event')} className="text-sm text-emerald-600 font-medium hover:underline">Kelola Event</button>
                                    </div>
                                    <div className="space-y-4">

                                            <label className="cursor-pointer">
                                                <input type="radio" name="type" value="out" className="peer sr-only" />
                                                <div className="text-center px-2 py-2.5 border border-slate-200 rounded-xl peer-checked:bg-red-50 peer-checked:border-red-500 peer-checked:text-red-700 font-bold text-sm transition-all">
                                                    Pengeluaran<br/><span className="text-[10px] font-normal opacity-80">(Kas Berkurang)</span>
                                                </div>
                                            </label>
                                            <label className="cursor-pointer">
                                                <input type="radio" name="type" value="piutang" className="peer sr-only" />
                                                <div className="text-center px-2 py-2.5 border border-slate-200 rounded-xl peer-checked:bg-blue-50 peer-checked:border-blue-500 peer-checked:text-blue-700 font-bold text-sm transition-all">
                                                    Piutang<br/><span className="text-[10px] font-normal opacity-80">(Tagihan ke orang)</span>
                                                </div>
                                            </label>
                                            <label className="cursor-pointer">
                                                <input type="radio" name="type" value="hutang" className="peer sr-only" />
                                                <div className="text-center px-2 py-2.5 border border-slate-200 rounded-xl peer-checked:bg-orange-50 peer-checked:border-orange-500 peer-checked:text-orange-700 font-bold text-sm transition-all">
                                                    Hutang<br/><span className="text-[10px] font-normal opacity-80">(Kewajiban Komunitas)</span>
                                                </div>
                                            </label>
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-slate-700 mb-1">Nominal (Rp)</label>
                                        <input required type="number" name="amount" min="1" className="w-full px-4 py-2.5 rounded-xl border border-slate-300 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all" placeholder="Contoh: 150000" />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-slate-700 mb-1">Keterangan</label>
                                        <input required type="text" name="desc" className="w-full px-4 py-2.5 rounded-xl border border-slate-300 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all" placeholder="Contoh: Beli Bola Baru / Kasbon Budi" />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-slate-700 mb-1">Tanggal</label>
                                        <input required type="date" name="date" defaultValue={getTodayString()} className="w-full px-4 py-2.5 rounded-xl border border-slate-300 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all" />
                                    </div>
                                    <div className="pt-2">
                                        <button type="submit" className="w-full bg-slate-900 hover:bg-slate-800 text-white font-medium py-2.5 rounded-xl transition-colors">
                                            Simpan Transaksi
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Modal Event */}
                    {isEventModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                            <div className="bg-white rounded-2xl w-full max-w-md shadow-2xl animate-in zoom-in-95 duration-200">
                                <div className="flex justify-between items-center p-5 border-b border-slate-100">
                                    <h3 className="font-bold text-lg text-slate-900">Tambah Event Baru</h3>
                                    <button onClick={() => setIsEventModalOpen(false)} className="text-slate-400 hover:text-slate-600"><X size={20}/></button>
                                </div>
                                <form onSubmit={handleAddEvent} className="p-5 space-y-4">
                                    <div>
                                        <label className="block text-sm font-medium text-slate-700 mb-1">Nama Event</label>
                                        <input required type="text" name="title" className="w-full px-4 py-2.5 rounded-xl border border-slate-300 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all" placeholder="Contoh: Fun Football vs Bintaro FC" />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-slate-700 mb-1">Tipe Event</label>
                                        <select required name="type" className="w-full px-4 py-2.5 rounded-xl border border-slate-300 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all bg-white">
                                            <option value="Internal Match">Internal Match</option>
                                            <option value="Friendly">Friendly</option>
                                            <option value="Trofeo">Trofeo</option>
                                        </select>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-1">Tanggal</label>
                                            <input required type="date" name="date" defaultValue={getTodayString()} className="w-full px-4 py-2.5 rounded-xl border border-slate-300 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-1">Waktu</label>
                                            <input required type="time" name="time" defaultValue="19:00" className="w-full px-4 py-2.5 rounded-xl border border-slate-300 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all" />
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-slate-700 mb-1">Lokasi</label>
                                        <input required type="text" name="location" className="w-full px-4 py-2.5 rounded-xl border border-slate-300 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-all" placeholder="Nama Lapangan / Stadion" />
                                    </div>
                                    <div className="pt-2">
                                        <button type="submit" className="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2.5 rounded-xl transition-colors">
                                            Jadwalkan Event
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Modal Input Massal Peserta */}
                    {isBulkModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4 z-50">
                            <div className="bg-white rounded-2xl w-full max-w-2xl shadow-2xl animate-in zoom-in-95 duration-200 flex flex-col max-h-[90vh]">
                                <div className="flex justify-between items-center p-5 border-b border-slate-100 shrink-0">
                                    <div>
                                        <h3 className="font-bold text-lg text-slate-900">Tambah Peserta Massal</h3>
                                        <p className="text-sm text-slate-500">Tulis/Paste daftar nama. Pisahkan tiap nama dengan baris baru (Enter).</p>
                                    </div>
                                    <button onClick={() => setIsBulkModalOpen(false)} className="text-slate-400 hover:text-slate-600"><X size={20}/></button>
                                </div>
                                <form onSubmit={handleAddBulkParticipants} className="p-5 overflow-y-auto space-y-4">
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                        <div><label className="block text-sm font-bold text-slate-700 mb-2">Pemain (100%)</label><textarea name="pemain" rows="4" className="w-full px-3 py-2 rounded-xl border border-slate-300 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none text-sm resize-none" placeholder="Budi&#10;Andi"></textarea></div>
                                        <div><label className="block text-sm font-bold text-slate-700 mb-2">Kiper (50%)</label><textarea name="kiper" rows="4" className="w-full px-3 py-2 rounded-xl border border-slate-300 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none text-sm resize-none" placeholder="Deni&#10;Eko"></textarea></div>
                                        <div><label className="block text-sm font-bold text-slate-700 mb-2">Pelajar (80%)</label><textarea name="pelajar" rows="4" className="w-full px-3 py-2 rounded-xl border border-slate-300 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none text-sm resize-none" placeholder="Fajar"></textarea></div>
                                        <div><label className="block text-sm font-bold text-slate-700 mb-2">Pengurus (0%)</label><textarea name="pengurus" rows="4" className="w-full px-3 py-2 rounded-xl border border-slate-300 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none text-sm resize-none" placeholder="Pak Yono"></textarea></div>
                                    </div>
                                    <div className="pt-4 border-t border-slate-100"><button type="submit" className="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2.5 rounded-xl transition-colors">Simpan Peserta Massal</button></div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const rootElement = document.getElementById('root');
        const root = createRoot(rootElement);
        root.render(<App />);
    </script>
</body>
</html>
